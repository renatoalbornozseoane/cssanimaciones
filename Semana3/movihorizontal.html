<html>
<head>
    <title>ANIMACION 3 CSS</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
        }
        .contenedor{
            width: 400px;
            height: 200px;
            border: 1px solid black;
            position: relative; /* para centrar el div */
            margin: 0 auto; /* para centrar el div */

            overflow: hidden;/* muestra solo lo interior */
        }

        .cuadrito{
            width: 100px;
            height: 100px;
            background-color: red;
            position: absolute; /* Para que se mueva dentro del contenedor*/

            top: 50px;
            left: 200px;
            animation: cuadrito 3s infinite linear;
        }

        @keyframes cuadrito{
            from{
                left: -200px;
            }
            to{
                left: 500px;
            }
        }

    
    </style>
</head>
<body>
<div class="contenedor">

   <div class="cuadrito"></div>

</div>

</body>
</html>
