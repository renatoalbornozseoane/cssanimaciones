<html>
<head>
    <title>ANIMACION 3 CSS</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
        }
        .contenedor{
            width: 400px;
            height: 200px;
            border: 1px solid black;
            position: relative; /* para centrar el div */
            margin: 0 auto; /* para centrar el div */
            background-color: black;

            overflow: hidden;/* muestra solo lo interior */
        }

        .estrellita1{
            width: 3px;
            height: 3px;
            background-color: white;
            position: absolute; 
            top: 15px;
            left: 30px;
            animation: estrellita 8s infinite linear;
        }
        @keyframes estrellita{
            from{
                left: -100px;
            }
            to{
                left: 500px;
            }
        }
