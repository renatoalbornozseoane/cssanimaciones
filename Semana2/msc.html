<html>
<head>
    <title>ANIMACIONES CSS - ANIMATION</title>
    <style>
    h1{
        font-family: "century gotic";
        color: rgba(165, 42, 42, 0);
        text-align: center;

        animation-name: titulo; /* titulo para la animacion */
        animation-duration: 3s; /* duracion de la animacion */
        animation-iteration-count: 1; /* cant. de veces que se realiza la animacion */
        animation-fill-mode: forwards; /* indicas cual es el ultimo estado que se mantiene */
    }

    @keyframes titulo{
        from{
            color: rgba(165, 42, 42, 0);
        }
        to{
            color: rgb(255, 0, 55);
        }
    }

    p{
        text-align: center;
        font-family: "century gotic";
        font-weight: bold;
        animation-name: texto;
        animation-duration: 3s;
        animation-iteration-count: 1;
        animation-fill-mode: backwards;
        animation-delay: 3s;

    }

    @keyframes texto{
        from{
            color:rgba(0,0,0,0);
        }
        to{
            color:rgba(0,0,0,1);
        }
    }

    img{
        height: 200px;
        width: 200px;
        display: block; /* centra la imagen */
        margin: auto; /* centra imagen */
        opacity: 0;

        animation: imagen 3s 6s 1 forwards;
    }

    @keyframes imagen{
        from{
            opacity: 0;
        }
        to{
            opacity: 1;
        }
    }


    </style>
</head>
<body>
    <h1>MANUEL SEOANE CORRALES </h1>
    <p>UN DESTACADO POLITICO Y PERIODISTA PERUANO</p>
    <img src="img/MSC.png">
</body>
</html>
